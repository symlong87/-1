<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>餐厅预订</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
    .header { background: #f5f5f5; padding: 15px; }
    .header h2 { margin: 0; }
    .info { padding: 15px 0; }
    .info p { margin: 5px 0; color: #666; }
    .section { padding: 15px 0; border-top: 1px solid #eee; }
    .section h3 { font-size: 14px; }
    input, select { width: 100%; padding: 8px; margin: 5px 0; box-sizing: border-box; }
    .btn { width: 100%; padding: 12px; background: #ff6600; color: #fff; border: none; font-size: 16px; margin-top: 20px; }
    .time-slot { display: inline-block; padding: 8px 12px; border: 1px solid #ddd; margin: 3px; cursor: pointer; }
    .reviews { color: #ff9900; }
  </style>
</head>
<body>
  <div class="header">
    <h2>老北京铜锅涮肉（国贸店）</h2>
    <p class="reviews">★★★★☆ 4.3分 (1,247条评价)</p>
    <p>人均 ¥168 · 火锅 · 营业至 22:00</p>
  </div>

  <div class="info">
    <p>地址：北京市朝阳区建国门外大街1号国贸商城B1-23</p>
    <p>电话：010-8888-6666</p>
  </div>

  <div class="section">
    <h3>预订信息</h3>
    <label>用餐日期</label>
    <input type="date">

    <label>用餐时间</label>
    <div>
      <span class="time-slot">11:30</span>
      <span class="time-slot">12:00</span>
      <span class="time-slot">12:30</span>
      <span class="time-slot">13:00</span>
      <span class="time-slot">17:30</span>
      <span class="time-slot">18:00</span>
      <span class="time-slot">18:30</span>
      <span class="time-slot">19:00</span>
      <span class="time-slot">19:30</span>
      <span class="time-slot">20:00</span>
    </div>

    <label>用餐人数</label>
    <select>
      <option>1人</option>
      <option>2人</option>
      <option>3人</option>
      <option>4人</option>
      <option>5人</option>
      <option>6人</option>
      <option>7人</option>
      <option>8人</option>
      <option>9人</option>
      <option>10人</option>
    </select>
  </div>

  <div class="section">
    <h3>联系方式</h3>
    <label>姓名</label>
    <input type="text">
    <label>手机号</label>
    <input type="text">
    <label>备注</label>
    <input type="text" placeholder="如有特殊需求请填写">
  </div>

  <div class="section">
    <p>预订需支付定金 ¥50，到店消费后可抵扣</p>
  </div>

  <button class="btn">确认预订</button>
</body>
</html>
